<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blue AI</title>
    <!-- ONLY Office.js is needed now -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body>
    <!-- ... same body content as before ... -->
    <div id="app-body">
        <div class="header">
            <div class="header-text">
                <div class="header-title">Analyse Document</div>
                <div class="header-sub">SmartBlue AI</div>
            </div>
        </div>

        <div id="view-attachments" class="view">
            <div id="attachment-list">Loading attachments...</div>
            <div class="bundle-toggle" id="bundle-toggle-row">
                <label class="toggle-label">
                    <input type="checkbox" id="chk-bundle" checked/>
                    <span class="toggle-text">Upload as Bundle</span>
                </label>
            </div>
            <div id="primary-list"></div>
            <button id="btn-upload" class="btn-primary">⬆ Upload &amp; Analyse</button>
        </div>

        <div id="view-loading" class="view hidden">
            <div class="spinner"></div>
            <div id="loading-text">Uploading...</div>
        </div>

        <div id="view-chat" class="view hidden">
            <div id="chat-history"></div>
            <div id="suggestions-bar" class="hidden"><div id="suggestions-list"></div></div>
            <textarea id="user-input" placeholder="Ask a question..."></textarea>
            <button id="btn-send">Send</button>
        </div>

        <div id="view-error" class="view hidden">
            <div id="error-msg"></div>
            <button onclick="resetToAttachments()">Try Again</button>
        </div>
    </div>
    <script src="taskpane.js"></script>
</body>
</html>
