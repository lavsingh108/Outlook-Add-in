<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blue AI</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body>
    <div id="app-body">
        <div class="header">
            <img src="../../assets/logo.png" class="logo" width="30" height="30" alt="Blue AI"/>
            <div class="header-text">
                <div class="header-title">Analyse Document</div>
                <div class="header-sub">SmartBlue AI</div>
            </div>
        </div>

        <div id="view-attachments" class="view">
            <div id="attachment-list">Loading attachments…</div>
            <div class="footer">
                <button id="btn-upload-bundle" class="btn-primary">⬆ Upload &amp; Analyse</button>
            </div>
            <div id="status-msg" class="status-msg"></div>
        </div>

        <div id="view-chat" class="view hidden">
            <div id="chat-history"></div>
            <div class="chat-input-area">
                <textarea id="user-input" placeholder="Ask a question…" rows="1"></textarea>
                <button id="btn-send" class="btn-send">&#9658;</button>
            </div>
        </div>
    </div>
    <script src="taskpane.js"></script>
</body>
</html>
