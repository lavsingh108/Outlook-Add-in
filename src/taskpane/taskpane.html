<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blue AI</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.28.1/js/msal-browser.min.js"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body>
    <div id="app-body">

        <!-- Header -->
        <div class="header">
            <button id="btn-back" class="btn-back hidden" title="Back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <div class="header-text">
                <div class="header-title">Analyse Document</div>
                <div class="header-sub">SmartBlue AI</div>
            </div>
            <!-- Refresh — only visible in compose mode -->
            <button id="btn-refresh" class="btn-refresh hidden" title="Refresh recipients &amp; attachments">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
            </button>
        </div>

        <!-- ══════════════════════════════════════════════════════════
             COMPOSE VIEW
             Reads To/CC recipients and attachments from the email
             being composed. Refresh re-reads live state.
             ══════════════════════════════════════════════════════════ -->
        <div id="view-compose" class="view hidden">

            <!-- Recipients -->
            <div class="compose-section">
                <div class="compose-section-header">
                    <span class="compose-section-title">Recipients</span>
                    <span class="compose-badge" id="recipients-count"></span>
                </div>
                <div id="compose-recipients" class="compose-recipients-area">
                    <div class="compose-loading">Reading recipients…</div>
                </div>
            </div>

            <!-- Document (from email attachments) -->
            <div class="compose-section compose-section-grow">
                <div class="compose-section-header">
                    <span class="compose-section-title">Document</span>
                    <span class="compose-badge" id="attachments-count"></span>
                </div>
                <div id="compose-attachments" class="compose-att-list">
                    <div class="compose-loading">Reading attachments…</div>
                </div>
            </div>

            <!-- Action -->
            <div class="compose-footer">
                <button id="btn-compose-upload" class="btn-primary" disabled>
                    ⬆&nbsp; Upload &amp; Share
                </button>
            </div>

            <div id="compose-status" class="status-msg"></div>

            <!-- Result card — auto-shown after share URL is inserted -->
            <div id="compose-result" class="result-card hidden">
                <div class="result-top">
                    <svg class="result-check" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span class="result-inserted-text">Link inserted into email body</span>
                </div>
                <div class="result-label">Share Link</div>
                <div class="result-link-row">
                    <div class="result-link" id="result-link-text"></div>
                    <button class="btn-copy" id="btn-copy-link" title="Copy link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                </div>
            </div>

        </div><!-- /view-compose -->

        <!-- ══════════════════════════════════════════════════════════
             READ VIEW
             ══════════════════════════════════════════════════════════ -->
        <div id="view-attachments" class="view">
            <div class="mode-bar">
                <span class="mode-label" id="lbl-individual">Individual</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="chk-bulk" checked />
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                <span class="mode-label active" id="lbl-bundle">Bundle</span>
            </div>
            <div id="attachment-list" class="attachment-list">Loading attachments…</div>
            <div class="footer" id="bundle-footer">
                <button id="btn-upload-bundle" class="btn-primary">⬆ Upload &amp; Analyse</button>
            </div>
            <div id="status-msg" class="status-msg"></div>
        </div>

        <!-- ══════════════════════════════════════════════════════════
             CHAT VIEW
             ══════════════════════════════════════════════════════════ -->
        <div id="view-chat" class="view hidden">
            <div id="chat-history" class="chat-history"></div>
            <div id="suggestions" class="suggestions hidden"></div>
            <div class="chat-input-area">
                <textarea id="user-input" placeholder="Ask a question…" rows="1"></textarea>
                <button id="btn-send" class="btn-send">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>

    </div>
    <script type="text/javascript" src="taskpane.js"></script>
</body>
</html>
